<?xml version="1.0" encoding="UTF-8"?>
<!--
  RTSP Timelapse Capture System - application icon (master source).
  Concept: head-on RTSP/IP security camera on a TRANSPARENT background (no badge).
  Rounded housing + green live-status LED + wall mount; an amber timelapse
  "interval loop" arrow wraps the lens, and the lens "captures" a small starfield
  (astro theme).
  Palette: slate housing + amber accent (timelapse loop), green status LED.
  Edit this file, then run:  python scripts/build_icon.py  to regenerate assets/icon.ico + icon.png.
  Note: there is NO background rect here. The build script recovers transparency by
        rendering the artwork over white and black and reconstructing alpha (the cairo
        backend cannot emit alpha directly). The cairo backend also cannot render
        gradients, so all fills are flat.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Wall/ceiling mount (drawn behind the housing) -->
  <rect x="114" y="196" width="28" height="34" rx="7" fill="#465569"/>
  <rect x="92" y="222" width="72" height="20" rx="10" fill="#465569"/>

  <!-- Camera housing (head-on IP-cam face plate), near full-bleed -->
  <rect x="20" y="22" width="216" height="180" rx="40" fill="#e8edf3"/>
  <rect x="20" y="22" width="216" height="74" rx="40" fill="#ffffff" opacity="0.4"/>

  <!-- Timelapse interval loop: amber arc sweeping clockwise around the lens -->
  <path d="M 171.6 43.7 A 76 76 0 1 1 90 40.2"
        fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/>
  <polygon points="109,29.2 90.6,57.2 75.6,31.2" fill="#f59e0b"/>

  <!-- Lens (glass deepened to night-sky navy so the captured stars read) -->
  <circle cx="128" cy="106" r="64" fill="#0f172a"/>
  <circle cx="128" cy="106" r="51" fill="#334155"/>
  <circle cx="128" cy="106" r="36" fill="#1f2d4d"/>
  <!-- Starfield "captured" in the lens: a sparkle + a few small stars -->
  <polygon points="122,78 126,94 142,98 126,102 122,118 118,102 102,98 118,94" fill="#ffffff"/>
  <circle cx="143" cy="114" r="3.3" fill="#ffffff" opacity="0.85"/>
  <circle cx="111" cy="121" r="2.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="139" cy="88"  r="1.9" fill="#ffffff" opacity="0.6"/>

  <!-- Single "live / online" status LED (green), bottom-right corner -->
  <circle cx="206" cy="170" r="8" fill="#22c55e"/>
</svg>
