name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Focus on:
            - Correctness bugs and edge cases
            - Adherence to the project's existing patterns and conventions
            - Reuse and simplification opportunities

            Keep feedback concise and actionable. Prefer inline comments on the
            relevant lines. If the change looks good, say so briefly.
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment"'
